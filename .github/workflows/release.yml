name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (no tests)
        run: ./gradlew build -x test --no-daemon --stacktrace

      - name: Generate dependency table
        run: |
          chmod +x .github/scripts/build-deps-table.sh
          .github/scripts/build-deps-table.sh > deps-table.md
          echo "--- deps-table.md ---"
          cat deps-table.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body_path: deps-table.md
          files: |
            build/libs/*.jar
