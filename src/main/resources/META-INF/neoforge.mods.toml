modLoader="kotlinforforge"
loaderVersion="${loader_version_range}"
license="MIT"
issueTrackerURL="https://github.com/nitkanikita21/nodewire/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="nodewire.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neoforge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="kotlinforforge"
type="required"
versionRange="${kff_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="sable"
type="optional"
versionRange="[1.2.1,2)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="optional"
versionRange="${create_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create_aeronautics"
type="optional"
versionRange="[1.2.0,2)"
ordering="AFTER"
side="BOTH"
